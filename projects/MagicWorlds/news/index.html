<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.0.0/jquery.min.js"></script>

<div id="news"></div>

<script>

    var files = [   'news-07-04-2015.html',
                    'news-03-12-2013.html',
                    'news-02-12-2013.html',
                    'news-01-12-2013.html'];

    for (i in files){
        $.get( files[i], function( data ) {
            $("#news").append(data);
        });

    }

    $("#news-loading-data").html("");

</script>
